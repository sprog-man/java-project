spring:
  application:
    name: pet-companion-platform
  datasource:
    url: jdbc:mysql://localhost:3306/pet_companion_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      table-prefix:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.petcompany.platform.modules.*.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: pet_companion_platform_secret_key
  expire: 86400
  header: Authorization

logging:
  level:
    com.petcompany.platform: debug
    com.petcompany.platform.modules.*.mapper: debug
